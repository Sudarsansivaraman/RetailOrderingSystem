<div class="cart-container">
  <h2>Your Shopping Cart</h2>

  <div *ngIf="loading" class="loading">Loading cart...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <div *ngIf="!loading && !error">
    <div *ngIf="!cart || !cart.items || cart.items.length === 0" class="empty-cart">
      <p>Your cart is empty.</p>
      <button class="btn-primary" routerLink="/menu">Browse Menu</button>
    </div>

    <div *ngIf="cart && cart.items && cart.items.length > 0">
      <div class="cart-items">
        <div class="cart-item card" *ngFor="let item of cart.items">
          <div class="item-info">
            <!-- Ideally we fetch item details like name using itemId or include it in DTO -->
            <h3>Item ID: {{ item.itemId }}</h3>
          </div>
          <div class="item-actions">
            <button class="btn-secondary" (click)="updateQuantity(item.cartItemId, item.quantity - 1)">-</button>
            <span class="quantity">{{ item.quantity }}</span>
            <button class="btn-secondary" (click)="updateQuantity(item.cartItemId, item.quantity + 1)">+</button>
            <button class="btn-danger" (click)="removeItem(item.cartItemId)">Remove</button>
          </div>
        </div>
      </div>
      
      <div class="cart-summary card">
        <button class="btn-primary" (click)="checkout()">Proceed to Checkout</button>
      </div>
    </div>
  </div>
</div>
